# Continuous integration — all lab workspaces (push / PR)
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Labs 3–8 (Vitest + Playwright + lab8)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (lab5, lab6, lab7 E2E)
        run: npx playwright install --with-deps chromium

      - name: Run full test suite (labs 3–7)
        run: npm test
        env:
          CI: true

      - name: Lab7 E2E (single-page TodoMVC suite)
        run: npm run test:e2e -w lab7
        env:
          CI: true

      - name: Lab8 WebdriverIO (3 UI tests)
        run: npm run test:lab8:wdio

      - name: Lab8 TestCafe (3 UI tests)
        run: npm run test:lab8:testcafe

      - name: Upload Playwright reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: |
            lab5/playwright-report/
            lab6/playwright-report/
            lab7/playwright-report/
          if-no-files-found: ignore
